<body class="login rec-senha">

	<!-- Google Tag Manager (noscript) -->

	height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
	<!-- End Google Tag Manager (noscript) -->

	<header>
			<a href="/index.html"><img src="imgs/sabin.svg" id="logo-sabin"></a>
	</header>

	<div id="img-login">
		<div id="resultado-img" class="mostrar"></div>
		<div id="privacidade-img"></div>
	</div>

	<h1 style="display:none;">Sabin: login para Resultados de Exame e Termo de Consentimento</h1>

	<section id="login">

		<!--
		////////////////////////////////////////
		// LOGIN
		-->
		<div class="alerta" id="alerta-home">
			<img src="imgs/atencao.svg">
			Local para mensagem de erro.
		</div>

		<div id="quadro-login" class="quadro">

			<div class="abas">

				<div id="senha-wrapper" class="aba-wrapper selecionada">
					<form id="resultado-form" action="XXXXXXXX" method="post" class="radius-left-0" onsubmit="return confirma(3);" onde="3">
						<h3>Esqueci minha senha</h3>
						<p>Informe os dados abaixo que enviaremos uma nova senha para o seu e-mail.</p>
						<input type="email" name="UserEmail" id="result-email" placeholder="Seu e-mail">
						<div class="mensagem">Informe seu e-mail cadastrado.</div>
						<input type="text" name="UserNascimento" id="result-dob" placeholder="Data de nascimento" onkeyup="mascara_data(this);">
						<div class="mensagem">Informe sua data de nascimento.</div>
						<select name="UserSexo" id="result-sexo" onfocus="verifica_selecao(this);" onblur="verifica_selecao(this);" onchange="verifica_selecao(this);" class="placeholder-color">
							<option value="">Seu sexo</option>
							<option value="feminino">Feminino</option>
							<option value="masculino">Masculino</option>
						</select>
						<div class="mensagem">Informe seu sexo.</div>
						<label>Tipo:*</label>
						<div style="clear:both;"></div>
						<div class="halfs" id="radios-senha">
							<div class="half">
								<label for="paciente" class="radio">
									<input type="radio" name="result-tipo" id="paciente" value="paciente" checked> Paciente
								</label>
							</div>
							<div class="half">
								<label for="medico" class="radio">
									<input type="radio" name="result-tipo" id="medico" value="medico"> Médico
								</label>
							</div>
						</div>
						<input type="submit" value="Continuar">
					</form>
				</div>

			</div>

		</div>


	</section>

	<div style="clear:both;height:80px;"></div>

	<section id="nossoapp">
		<p>BAIXE NOSSO APLICATIVO:</p>
		<p>
			<a href="javascript:;"><img src="imgs/app-store.svg" alt="Sabin na App Store"></a>
			&nbsp;
			<a href="javascript:;"><img src="imgs/google-play.svg" alt="Sabin na Google Play"></a>
		</p>
	</section>


	<script type="text/javascript" src="js/script.js"></script>

</body>
